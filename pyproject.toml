[project]
name = "metatron"
version = "0.1.0"
description = "Capture a codebase's implementation decisions as structured priors and serve them to coding agents over MCP."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["metatron"]

[tool.pytest.ini_options]
testpaths = ["tests"]
