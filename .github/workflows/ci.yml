name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Lint
        run: uv run ruff check .
      - name: Run tests
        run: uv run pytest -q
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run front-end tests
        run: npm test
