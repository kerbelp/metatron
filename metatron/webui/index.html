<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metatron — Priors</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface-2: #1c2330;
      --border: #2a313c; --text: #e6edf3; --muted: #8b949e;
      --accent: #6e9fff; --green: #3fb950; --red: #f85149;
      --amber: #d29922; --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    header {
      padding: 20px 32px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    }
    footer {
      padding: 14px 32px; border-top: 1px solid var(--border);
      color: var(--muted); font-size: 12px;
    }
    footer #version { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    header h1 { margin: 0; font-size: 20px; letter-spacing: .3px; }
    .repo-select { margin-left: 8px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; font-size: 13px; }
    .nav { display: flex; gap: 4px; margin-left: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
    .nav button { padding: 6px 16px; border-radius: 7px; cursor: pointer; color: var(--muted); font-size: 13px; border: none; background: none; }
    .nav button.active { background: var(--surface-2); color: var(--text); }
    main { max-width: 980px; margin: 0 auto; padding: 24px 32px 64px; }
    .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px; min-width: 104px;
    }
    .stat .n { font-size: 22px; font-weight: 600; }
    .stat .l { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
    .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
    .tab { padding: 6px 14px; border-radius: 7px; cursor: pointer; color: var(--muted); font-size: 13px; border: none; background: none; }
    .tab.active { background: var(--surface-2); color: var(--text); }
    input[type=text] {
      flex: 1; min-width: 160px; background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; font-size: 14px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px;
    }
    .card .meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .4px; }
    .badge.high { background: rgba(63,185,80,.15); color: var(--green); }
    .badge.medium { background: rgba(210,153,34,.15); color: var(--amber); }
    .badge.low { background: rgba(139,148,158,.15); color: var(--muted); }
    .badge.canonical { background: rgba(110,159,255,.15); color: var(--accent); }
    .badge.candidate { background: rgba(210,153,34,.12); color: var(--amber); }
    .badge.rejected { background: rgba(248,81,73,.12); color: var(--red); }
    .badge.approve { background: rgba(63,185,80,.15); color: var(--green); }
    .badge.borderline { background: rgba(210,153,34,.15); color: var(--amber); }
    .badge.reject { background: rgba(248,81,73,.15); color: var(--red); }
    .badge.origin { background: rgba(139,148,158,.12); color: var(--muted); }
    .triage-reason { color: var(--muted); font-size: 13px; margin-top: 4px; font-style: italic; }
    .scope { color: var(--muted); font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .pattern { font-size: 15px; font-weight: 500; margin: 2px 0 6px; }
    .rationale { color: var(--muted); font-size: 14px; }
    .actions { margin-top: 12px; display: flex; gap: 8px; }
    button.act { border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
      padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 13px; }
    button.act:hover { border-color: var(--accent); }
    button.approve:hover { border-color: var(--green); color: var(--green); }
    button.reject:hover { border-color: var(--red); color: var(--red); }
    .pager { display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 22px; color: var(--muted); }
    .pager button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 7px; cursor: pointer; }
    .pager button:disabled { opacity: .4; cursor: default; }
    .empty { text-align: center; color: var(--muted); padding: 48px; }
    .id { color: var(--muted); font-size: 11px; font-family: ui-monospace, monospace; margin-left: auto; }
    .times { color: var(--muted); font-size: 12px; margin-top: 8px; }
    .section-title { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 26px 0 10px; }
    .bar { height: 10px; border-radius: 6px; background: var(--surface-2); overflow: hidden; margin-top: 6px; }
    .bar > span { display: block; height: 100%; background: var(--green); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 500; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .miss { color: var(--red); } .hit { color: var(--green); }
    .row-scope { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .row-scope .c { color: var(--muted); font-variant-numeric: tabular-nums; }
    tr.erow { cursor: pointer; }
    tr.erow:hover { background: var(--surface-2); }
    tr.erow td:first-child::before { content: "▸ "; color: var(--muted); }
    tr.erow.open td:first-child::before { content: "▾ "; }
    tr.detail > td { background: var(--surface-2); }
    .detail-prior { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .detail-prior:last-child { border-bottom: none; }
    .detail-prior .pat { margin: 3px 0; }
    .muted { color: var(--muted); font-size: 13px; }
    .kv { color: var(--muted); font-size: 13px; margin-bottom: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>Metatron</h1>
    <select id="repo" class="repo-select" title="Repository"></select>
    <div class="nav" id="nav">
      <button class="active" data-view="priors">Priors</button>
      <button data-view="obs">Observability</button>
    </div>
  </header>
  <main>
    <section id="view-priors">
      <div class="stats" id="stats"></div>
      <div class="controls">
        <div class="tabs" id="tabs">
          <button class="tab active" data-status="candidate">Candidates</button>
          <button class="tab" data-status="canonical">Canonical</button>
          <button class="tab" data-status="rejected">Rejected</button>
          <button class="tab" data-status="">All</button>
        </div>
        <input type="text" id="scope" placeholder="Filter by scope (e.g. src/components/Home)" />
      <select id="triage" class="repo-select" title="Triage recommendation">
        <option value="">Any recommendation</option>
        <option value="approve">✓ Recommended</option>
        <option value="borderline">~ Borderline</option>
        <option value="reject">✗ Not recommended</option>
        <option value="none">Untriaged</option>
      </select>
      </div>
      <div id="list"></div>
      <div class="pager" id="pager"></div>
    </section>

    <section id="view-obs" hidden>
      <div class="stats" id="usage-stats"></div>
      <div class="section-title">Onboarding ingest cost (one-time)</div>
      <div id="ingest-cost"></div>
      <div class="section-title">Prior quality by origin (ingest vs feedback)</div>
      <div id="origin-breakdown"></div>
      <div class="section-title">Feedback — helpful vs noise (advisory)</div>
      <div id="feedback-summary"></div>
      <div class="card">
        <div>Coverage — queries that returned at least one canonical prior</div>
        <div class="bar"><span id="cov-bar"></span></div>
        <div style="margin-top:8px;color:var(--muted);font-size:13px" id="cov-detail"></div>
      </div>
      <div class="section-title">Most-queried scopes</div>
      <div id="top-scopes"></div>
      <div class="section-title">Recent queries</div>
      <div id="recent-queries"></div>
      <div class="section-title">Recent submissions</div>
      <div id="recent-submissions"></div>
    </section>
  </main>
  <footer id="footer">metatron · <span id="version">…</span></footer>

  <script>
    const state = { repo: "", status: "candidate", scope: "", triage: "", page: 1, pageSize: 20, pages: 1 };

    function withRepo(params = {}) {
      const q = new URLSearchParams(params);
      if (state.repo) q.set("repo", state.repo);
      return q;
    }

    // ---- repo selector ----
    async function loadRepos() {
      const { repos } = await (await fetch("/api/repos")).json();
      const sel = document.getElementById("repo");
      const opts = ['<option value="">All repos</option>']
        .concat(repos.filter(r => r).map(r => `<option value="${esc(r)}">${esc(r)}</option>`));
      sel.innerHTML = opts.join("");
      sel.value = state.repo;
    }

    // ---- Priors view ----
    async function loadStats() {
      const s = await (await fetch("/api/stats?" + withRepo())).json();
      document.getElementById("stats").innerHTML = [
        ["Candidates", s.candidate], ["Canonical", s.canonical],
        ["Rejected", s.rejected], ["Total", s.total],
      ].map(([l, n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
    }
    async function loadPriors() {
      const q = withRepo({ page: state.page, page_size: state.pageSize });
      if (state.status) q.set("status", state.status);
      if (state.scope) q.set("scope", state.scope);
      if (state.triage) q.set("triage", state.triage);
      const data = await (await fetch("/api/priors?" + q)).json();
      state.pages = data.pages || 1;
      renderPriors(data); renderPager(data);
    }
    function renderPriors(data) {
      const list = document.getElementById("list");
      if (!data.items.length) { list.innerHTML = `<div class="empty">No priors here.</div>`; return; }
      list.innerHTML = data.items.map(p => `
        <div class="card">
          <div class="meta">
            <span class="badge ${p.confidence}">${p.confidence}</span>
            <span class="scope">${p.scope || "(global)"}</span>
            <span class="badge ${p.status}">${p.status}</span>
            ${p.triage && p.triage !== "none" ? `<span class="badge ${p.triage}">${p.triage}</span>` : ""}
            <span class="badge origin">${originLabel(p.origin)}</span>
            <span class="id">${p.id.slice(0, 8)}</span>
          </div>
          <div class="pattern">${esc(p.pattern)}</div>
          <div class="rationale">${esc(p.rationale)}</div>
          ${p.triage_reason ? `<div class="triage-reason">judge: ${esc(p.triage_reason)}</div>` : ""}
          <div class="times">introduced ${fmtTime(p.created_at)}${
            p.status !== "candidate"
              ? ` · ${p.status === "canonical" ? "accepted" : "rejected"} ${fmtTime(p.updated_at)}`
              : ""}</div>
          <div class="actions">
            ${p.status !== "canonical" ? `<button class="act approve" onclick="act('${p.id}','approve')">Approve</button>` : ""}
            ${p.status !== "rejected" ? `<button class="act reject" onclick="act('${p.id}','reject')">Reject</button>` : ""}
          </div>
        </div>`).join("");
    }
    function renderPager(data) {
      const pager = document.getElementById("pager");
      if (state.pages <= 1) { pager.innerHTML = ""; return; }
      pager.innerHTML = `
        <button ${state.page <= 1 ? "disabled" : ""} onclick="go(-1)">Prev</button>
        <span>Page ${state.page} of ${state.pages} · ${data.total} total</span>
        <button ${state.page >= state.pages ? "disabled" : ""} onclick="go(1)">Next</button>`;
    }
    async function act(id, action) { await fetch(`/api/priors/${id}/${action}`, { method: "POST" }); await refreshPriors(); }
    function go(delta) { state.page = Math.max(1, state.page + delta); loadPriors(); }
    async function refreshPriors() { await loadStats(); await loadPriors(); }

    // ---- Observability view ----
    async function loadUsage() {
      const u = await (await fetch("/api/usage?" + withRepo())).json();
      document.getElementById("usage-stats").innerHTML = [
        ["Queries", u.total_queries], ["Coverage", Math.round(u.coverage_rate * 100) + "%"],
        ["Avg priors / query", u.avg_results], ["Submissions", u.total_submissions],
      ].map(([l, n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

      document.getElementById("cov-bar").style.width = Math.round(u.coverage_rate * 100) + "%";
      document.getElementById("cov-detail").textContent =
        `${u.hits} hit / ${u.misses} miss out of ${u.total_queries} queries`;

      document.getElementById("top-scopes").innerHTML = u.top_scopes.length
        ? u.top_scopes.map(s => `<div class="row-scope"><span class="scope">${esc(s.scope)}</span><span class="c">${s.count}</span></div>`).join("")
        : `<div class="empty">No queries yet. Point an agent at \`metatron serve\`.</div>`;

      renderEvents("recent-queries", u.recent_queries || [], "query", "q");
      renderEvents("recent-submissions", u.recent_submissions || [], "submit", "s");
      loadIngestCost();
      loadQuality();
    }

    const ORIGIN_LABELS = { bootstrap: "ingest", agent_feedback: "feedback", agent_submitted: "agent" };
    function originLabel(o) { return ORIGIN_LABELS[o] || o || "?"; }
    function pct(x) { return x == null ? "—" : Math.round(x * 100) + "%"; }

    async function loadQuality() {
      const ob = await (await fetch("/api/origins?" + withRepo())).json();
      const oEl = document.getElementById("origin-breakdown");
      oEl.innerHTML = ob.origins.length
        ? `<table><thead><tr><th>Origin</th><th class="num">Candidate</th><th class="num">Canonical</th>
             <th class="num">Rejected</th><th class="num">Accept rate</th></tr></thead><tbody>${
            ob.origins.map(o => `<tr><td class="scope">${originLabel(o.origin)}</td>
              <td class="num">${o.candidate}</td><td class="num">${o.canonical}</td>
              <td class="num">${o.rejected}</td><td class="num">${pct(o.accept_rate)}</td></tr>`).join("")
          }</tbody></table>
          <div class="muted" style="margin-top:6px">Accept rate = canonical / (canonical + rejected) — how often a curated prior from that origin was kept.</div>`
        : `<div class="empty">No priors yet.</div>`;

      const fb = await (await fetch("/api/feedback?" + withRepo())).json();
      const fEl = document.getElementById("feedback-summary");
      if (!fb.by_origin.length) {
        fEl.innerHTML = `<div class="empty">No feedback yet. Agents report it via submit_feedback.</div>`;
        return;
      }
      const byOrigin = `<table><thead><tr><th>Origin</th><th class="num">Helpful</th>
          <th class="num">Noise</th><th class="num">Helpful rate</th></tr></thead><tbody>${
          fb.by_origin.map(o => `<tr><td class="scope">${originLabel(o.origin)}</td>
            <td class="num">${o.helpful}</td><td class="num">${o.noise}</td>
            <td class="num">${pct(o.helpful_rate)}</td></tr>`).join("")
        }</tbody></table>`;
      const noisy = fb.priors.filter(p => p.noise > 0).slice(0, 8);
      const noisyTable = noisy.length
        ? `<div class="muted" style="margin-top:10px">Flagged as noise — review candidates for demotion:</div>
           <table><thead><tr><th>Pattern</th><th>Origin</th><th class="num">Helpful</th><th class="num">Noise</th></tr></thead><tbody>${
            noisy.map(p => `<tr><td>${esc(p.pattern)}</td><td class="scope">${originLabel(p.origin)}</td>
              <td class="num">${p.helpful}</td><td class="num">${p.noise}</td></tr>`).join("")
          }</tbody></table>`
        : "";
      fEl.innerHTML = byOrigin + noisyTable;
    }

    async function loadIngestCost() {
      const { runs } = await (await fetch("/api/ingest-cost?" + withRepo())).json();
      const el = document.getElementById("ingest-cost");
      if (!runs.length) { el.innerHTML = `<div class="empty">No ingest recorded yet.</div>`; return; }
      el.innerHTML = `<table><thead><tr><th>When</th><th>Model</th><th class="num">Scopes</th>
        <th class="num">Priors</th><th class="num">Tokens (in/out)</th><th class="num">Est. cost</th></tr></thead>
        <tbody>${runs.map(r => `<tr>
          <td>${fmtTime(r.timestamp)}</td>
          <td class="scope">${esc(r.model || "—")}</td>
          <td class="num">${r.scopes}</td>
          <td class="num">${r.priors_created}</td>
          <td class="num">${r.input_tokens.toLocaleString()} / ${r.output_tokens.toLocaleString()}</td>
          <td class="num">${r.estimated_cost == null ? "—" : "$" + r.estimated_cost.toFixed(2)}</td>
        </tr>`).join("")}</tbody></table>
        <div class="muted" style="margin-top:6px">Cost is estimated (tokens × approximate published rates); tokens are measured.</div>`;
    }

    function renderEvents(containerId, events, kind, prefix) {
      const el = document.getElementById(containerId);
      if (!events.length) { el.innerHTML = `<div class="empty">None yet.</div>`; return; }
      const head = kind === "query"
        ? `<tr><th>When</th><th>Area</th><th>Task</th><th class="num">Returned</th></tr>`
        : `<tr><th>When</th><th>Scope</th><th>Submitted pattern</th></tr>`;
      const cols = kind === "query" ? 4 : 3;
      const rows = events.map((e, i) => {
        const id = prefix + i;
        const when = fmtTime(e.timestamp);
        let summary;
        if (kind === "query") {
          const rc = `<span class="${e.result_count > 0 ? "hit" : "miss"}">${e.result_count}</span>`;
          summary = `<td>${when}</td><td class="scope">${esc(e.area || "—")}</td><td>${esc(e.task || "")}</td><td class="num">${rc}</td>`;
        } else {
          const pat = e.priors[0] ? esc(e.priors[0].pattern) : "(prior removed)";
          summary = `<td>${when}</td><td class="scope">${esc(e.area || "—")}</td><td>${pat}</td>`;
        }
        return `<tr class="erow" onclick="toggleDetail('${id}', this)">${summary}</tr>
          <tr class="detail" id="${id}" hidden><td colspan="${cols}">${detailBlock(e, kind)}</td></tr>`;
      }).join("");
      el.innerHTML = `<table><thead>${head}</thead><tbody>${rows}</tbody></table>`;
    }

    function detailBlock(e, kind) {
      const meta = kind === "query"
        ? `<div class="kv">area: <span class="scope">${esc(e.area)}</span></div>
           <div class="kv">task: ${esc(e.task || "—")}</div>`
        : `<div class="kv">submitted to scope: <span class="scope">${esc(e.area)}</span></div>`;
      const priors = (e.priors && e.priors.length)
        ? e.priors.map(p => `
            <div class="detail-prior">
              <span class="badge ${p.confidence}">${p.confidence}</span>
              <span class="scope">${esc(p.scope || "(global)")}</span>
              <div class="pat">${esc(p.pattern)}</div>
              <div class="muted">${esc(p.rationale || "")}</div>
            </div>`).join("")
        : `<div class="muted">${kind === "query" ? "No priors returned (miss)." : "No prior found."}</div>`;
      return meta + `<div class="kv" style="margin-top:8px">returned:</div>` + priors;
    }

    function toggleDetail(id, row) {
      const el = document.getElementById(id);
      if (!el) return;
      el.hidden = !el.hidden;
      row.classList.toggle("open", !el.hidden);
    }

    // ---- shared ----
    function esc(s) { const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }
    function fmtTime(iso) { try { return new Date(iso).toLocaleString(); } catch { return iso; } }

    document.getElementById("nav").addEventListener("click", e => {
      if (!e.target.dataset.view) return;
      document.querySelectorAll("#nav button").forEach(b => b.classList.remove("active"));
      e.target.classList.add("active");
      const obs = e.target.dataset.view === "obs";
      document.getElementById("view-obs").hidden = !obs;
      document.getElementById("view-priors").hidden = obs;
      if (obs) loadUsage(); else refreshPriors();
    });
    document.getElementById("tabs").addEventListener("click", e => {
      if (!e.target.dataset.hasOwnProperty("status")) return;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      e.target.classList.add("active");
      state.status = e.target.dataset.status; state.page = 1; loadPriors();
    });
    let scopeTimer;
    document.getElementById("scope").addEventListener("input", e => {
      clearTimeout(scopeTimer);
      scopeTimer = setTimeout(() => { state.scope = e.target.value.trim(); state.page = 1; loadPriors(); }, 250);
    });
    document.getElementById("triage").addEventListener("change", e => {
      state.triage = e.target.value; state.page = 1; loadPriors();
    });
    document.getElementById("repo").addEventListener("change", e => {
      state.repo = e.target.value; state.page = 1;
      const onObs = !document.getElementById("view-obs").hidden;
      if (onObs) loadUsage(); else refreshPriors();
    });

    async function loadVersion() {
      try {
        const v = await (await fetch("/api/version")).json();
        document.getElementById("version").textContent = "rev " + (v.revision || "unknown");
      } catch { document.getElementById("version").textContent = "rev unknown"; }
    }

    (async () => { await loadVersion(); await loadRepos(); await refreshPriors(); })();
  </script>
</body>
</html>
