<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metatron — Priors</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface-2: #1c2330;
      --border: #2a313c; --text: #e6edf3; --muted: #8b949e;
      --accent: #6e9fff; --green: #3fb950; --red: #f85149;
      --amber: #d29922; --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    header {
      padding: 24px 32px; border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 20px; letter-spacing: .3px; }
    header .tag { color: var(--muted); font-size: 13px; }
    main { max-width: 980px; margin: 0 auto; padding: 24px 32px 64px; }
    .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px; min-width: 104px;
    }
    .stat .n { font-size: 22px; font-weight: 600; }
    .stat .l { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
    .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
    .tab { padding: 6px 14px; border-radius: 7px; cursor: pointer; color: var(--muted); font-size: 13px; border: none; background: none; }
    .tab.active { background: var(--surface-2); color: var(--text); }
    input[type=text] {
      flex: 1; min-width: 160px; background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; font-size: 14px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px;
    }
    .card .meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .4px; }
    .badge.high { background: rgba(63,185,80,.15); color: var(--green); }
    .badge.medium { background: rgba(210,153,34,.15); color: var(--amber); }
    .badge.low { background: rgba(139,148,158,.15); color: var(--muted); }
    .badge.canonical { background: rgba(110,159,255,.15); color: var(--accent); }
    .badge.candidate { background: rgba(210,153,34,.12); color: var(--amber); }
    .badge.rejected { background: rgba(248,81,73,.12); color: var(--red); }
    .scope { color: var(--muted); font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .pattern { font-size: 15px; font-weight: 500; margin: 2px 0 6px; }
    .rationale { color: var(--muted); font-size: 14px; }
    .actions { margin-top: 12px; display: flex; gap: 8px; }
    button.act { border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
      padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 13px; }
    button.act:hover { border-color: var(--accent); }
    button.approve:hover { border-color: var(--green); color: var(--green); }
    button.reject:hover { border-color: var(--red); color: var(--red); }
    .pager { display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 22px; color: var(--muted); }
    .pager button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 7px; cursor: pointer; }
    .pager button:disabled { opacity: .4; cursor: default; }
    .empty { text-align: center; color: var(--muted); padding: 48px; }
    .id { color: var(--muted); font-size: 11px; font-family: ui-monospace, monospace; margin-left: auto; }
  </style>
</head>
<body>
  <header>
    <h1>Metatron</h1>
    <span class="tag">Priors curation — approve what becomes canonical</span>
  </header>
  <main>
    <div class="stats" id="stats"></div>
    <div class="controls">
      <div class="tabs" id="tabs">
        <button class="tab active" data-status="candidate">Candidates</button>
        <button class="tab" data-status="canonical">Canonical</button>
        <button class="tab" data-status="rejected">Rejected</button>
        <button class="tab" data-status="">All</button>
      </div>
      <input type="text" id="scope" placeholder="Filter by scope (e.g. src/components/Home)" />
    </div>
    <div id="list"></div>
    <div class="pager" id="pager"></div>
  </main>

  <script>
    const state = { status: "candidate", scope: "", page: 1, pageSize: 20, pages: 1 };

    async function loadStats() {
      const s = await (await fetch("/api/stats")).json();
      document.getElementById("stats").innerHTML = [
        ["Candidates", s.candidate], ["Canonical", s.canonical],
        ["Rejected", s.rejected], ["Total", s.total],
      ].map(([l, n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
    }

    async function loadPriors() {
      const q = new URLSearchParams({ page: state.page, page_size: state.pageSize });
      if (state.status) q.set("status", state.status);
      if (state.scope) q.set("scope", state.scope);
      const data = await (await fetch("/api/priors?" + q)).json();
      state.pages = data.pages || 1;
      render(data);
      renderPager(data);
    }

    function render(data) {
      const list = document.getElementById("list");
      if (!data.items.length) { list.innerHTML = `<div class="empty">No priors here.</div>`; return; }
      list.innerHTML = data.items.map(p => `
        <div class="card">
          <div class="meta">
            <span class="badge ${p.confidence}">${p.confidence}</span>
            <span class="scope">${p.scope || "(global)"}</span>
            <span class="badge ${p.status}">${p.status}</span>
            <span class="id">${p.id.slice(0, 8)}</span>
          </div>
          <div class="pattern">${esc(p.pattern)}</div>
          <div class="rationale">${esc(p.rationale)}</div>
          <div class="actions">
            ${p.status !== "canonical" ? `<button class="act approve" onclick="act('${p.id}','approve')">Approve</button>` : ""}
            ${p.status !== "rejected" ? `<button class="act reject" onclick="act('${p.id}','reject')">Reject</button>` : ""}
          </div>
        </div>`).join("");
    }

    function renderPager(data) {
      const pager = document.getElementById("pager");
      if (state.pages <= 1) { pager.innerHTML = ""; return; }
      pager.innerHTML = `
        <button ${state.page <= 1 ? "disabled" : ""} onclick="go(-1)">Prev</button>
        <span>Page ${state.page} of ${state.pages} · ${data.total} total</span>
        <button ${state.page >= state.pages ? "disabled" : ""} onclick="go(1)">Next</button>`;
    }

    async function act(id, action) {
      await fetch(`/api/priors/${id}/${action}`, { method: "POST" });
      await refresh();
    }
    function go(delta) { state.page = Math.max(1, state.page + delta); loadPriors(); }
    async function refresh() { await loadStats(); await loadPriors(); }
    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    document.getElementById("tabs").addEventListener("click", e => {
      if (!e.target.dataset.hasOwnProperty("status")) return;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      e.target.classList.add("active");
      state.status = e.target.dataset.status; state.page = 1; loadPriors();
    });
    let scopeTimer;
    document.getElementById("scope").addEventListener("input", e => {
      clearTimeout(scopeTimer);
      scopeTimer = setTimeout(() => { state.scope = e.target.value.trim(); state.page = 1; loadPriors(); }, 250);
    });

    refresh();
  </script>
</body>
</html>
